<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new account to access the Library Management System.">
  <title>Register — Library Management System</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="glass-card auth-card">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon-large">✨</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join the library and start exploring</p>
      </div>

      <!-- Error alert -->
      <div class="alert-error" id="register-error"></div>

      <!-- Registration Form -->
      <form id="register-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input
            type="text"
            id="reg-username"
            class="form-input"
            placeholder="Choose a username"
            autocomplete="username"
            minlength="3"
            maxlength="50"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input
            type="password"
            id="reg-password"
            class="form-input"
            placeholder="Create a password (min 4 characters)"
            autocomplete="new-password"
            minlength="4"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-role">Account Type</label>
          <select id="reg-role" class="form-select">
            <option value="student">📚 Student</option>
            <option value="librarian">🔑 Librarian</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="register-submit">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('register-form');
      const errorEl = document.getElementById('register-error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.remove('show');

        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const role = document.getElementById('reg-role').value;

        if (!username || !password) {
          errorEl.textContent = 'Please fill in all fields.';
          errorEl.classList.add('show');
          return;
        }

        if (username.length < 3) {
          errorEl.textContent = 'Username must be at least 3 characters.';
          errorEl.classList.add('show');
          return;
        }

        if (password.length < 4) {
          errorEl.textContent = 'Password must be at least 4 characters.';
          errorEl.classList.add('show');
          return;
        }

        const submitBtn = document.getElementById('register-submit');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        try {
          const resp = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password, role }),
          });

          const result = await resp.json();

          if (!resp.ok) {
            throw new Error(result.detail || 'Registration failed.');
          }

          // Redirect based on role
          window.location.href = role === 'librarian' ? '/librarian' : '/dashboard';
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
